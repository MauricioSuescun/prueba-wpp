<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Video Post 320x480</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; }
      .banner {
        width: 320px;
        height: 480px;
        background: #000;
        position: relative;
        cursor: pointer;
        overflow: hidden;
      }
      .banner .video-wrap {
        width: 100%;
        height: calc(100% - 48px);
        position: relative;
      }
      .banner video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .banner .controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: rgba(0,0,0,0.85);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
      }
      .banner .controls button {
        cursor: pointer;
        border: none;
        background: #fff;
        color: #222;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .banner .controls button:hover {
        background: #eee;
      }
      .banner .controls .vol-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .banner .controls input[type="range"] {
        width: 70px;
        height: 6px;
        cursor: pointer;
      }
      .banner .brand {
        position: absolute;
        top: 12px;
        left: 12px;
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
    </style>
  </head>
  <body>
    <div class="banner" id="banner">
      <span class="brand">Marca Demo</span>
      <div class="video-wrap">
        <video id="video" playsinline preload="metadata"
          src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4">
        </video>
      </div>
      <div class="controls" id="controls">
        <button type="button" id="btn-play" title="Play">▶</button>
        <button type="button" id="btn-pause" title="Pause" style="display:none;">❚❚</button>
        <button type="button" id="btn-mute" title="Mute">🔊</button>
        <div class="vol-wrap">
          <input type="range" id="vol" min="0" max="100" value="100" title="Volumen">
        </div>
      </div>
    </div>
    <script type="module">
      import { initVideoBanner } from "./video-banner.js";
      initVideoBanner({
        size: "320x480",
        clickUrl: "https://example.com",
      });
    </script>
  </body>
</html>
