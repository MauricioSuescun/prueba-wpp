<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Video Post 300x600</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        background: #f0f2f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      .banner {
        width: 300px;
        height: 600px;
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      }
      .video-wrap {
        position: relative;
        width: 100%;
        height: 338px;
        background: #1c1c1e;
      }
      .video-wrap video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .play-overlay {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 56px; height: 56px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(6px);
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        z-index: 5;
        cursor: pointer;
      }
      .play-overlay:hover {
        background: rgba(255,255,255,0.3);
        transform: translate(-50%, -50%) scale(1.08);
      }
      .play-overlay.hidden { opacity: 0; pointer-events: none; }
      .play-icon {
        width: 0; height: 0;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-left: 16px solid #fff;
        margin-left: 4px;
      }
      .video-controls {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.88));
        padding: 14px 10px 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.25s;
      }
      .video-wrap:hover .video-controls { opacity: 1; }
      .ctrl-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .ctrl-btn:hover { transform: scale(1.15); }
      .ctrl-btn svg { width: 18px; height: 18px; fill: #fff; }
      .progress-bar {
        flex: 1;
        height: 4px;
        background: rgba(255,255,255,0.25);
        border-radius: 4px;
        cursor: pointer;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #fff;
        border-radius: 4px;
        width: 0%;
        transition: width 0.15s;
      }
      .volume-slider {
        width: 48px;
        accent-color: #fff;
        cursor: pointer;
      }
      .volume-badge {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 28px;
        height: 28px;
        background: rgba(0,0,0,0.5);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 4;
        pointer-events: none;
      }
      .volume-badge svg { width: 14px; height: 14px; fill: #fff; }
      .post-content {
        padding: 12px 14px 14px;
        background: #fff;
        border-top: 1px solid #e4e6eb;
      }
      .post-title {
        font-size: 15px;
        font-weight: 600;
        color: #1c1e21;
        line-height: 1.35;
        margin: 0 0 10px;
      }
      .post-actions {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 8px;
      }
      .post-actions span {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        font-size: 13px;
        color: #65676b;
        border-radius: 4px;
      }
      .post-actions span:hover { background: #f0f2f5; color: #1877f2; }
      .post-metrics {
        font-size: 13px;
        color: #65676b;
      }
      .post-metrics .sep { margin: 0 4px; }
      .stats-panel {
        position: fixed;
        top: 16px; right: 16px;
        background: rgba(0,0,0,0.92);
        border: 1px solid #333;
        border-radius: 10px;
        padding: 14px 18px;
        color: #fff;
        font-size: 12px;
        min-width: 200px;
        z-index: 999;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      .stats-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 10px; }
      .stats-panel .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
      .stats-panel .stat-row:last-child { border-bottom: none; }
      .stats-panel .stat-count { font-weight: 700; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="stats-panel" id="statsPanel">
      <h3>Métricas de interacción</h3>
      <div class="stat-row"><span>▶ Play</span><span class="stat-count" id="s-video_play">0</span></div>
      <div class="stat-row"><span>⏸ Pause</span><span class="stat-count" id="s-video_pause">0</span></div>
      <div class="stat-row"><span>🔇 Mute</span><span class="stat-count" id="s-video_mute">0</span></div>
      <div class="stat-row"><span>🔊 Unmute</span><span class="stat-count" id="s-video_unmute">0</span></div>
      <div class="stat-row"><span>🔉 Volumen</span><span class="stat-count" id="s-video_volume_change">0</span></div>
      <div class="stat-row"><span>↔ Progreso</span><span class="stat-count" id="s-video_seek">0</span></div>
      <div class="stat-row"><span>🖱 Clic banner</span><span class="stat-count" id="s-banner_click">0</span></div>
    </div>
    <div class="banner" id="banner">
      <div class="video-wrap">
        <video id="video" playsinline preload="metadata"
          src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4">
        </video>
        <div class="play-overlay" id="playOverlay">
          <div class="play-icon"></div>
        </div>
        <div class="volume-badge" id="volumeBadge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </div>
        <div class="video-controls" id="controls">
          <button type="button" class="ctrl-btn" id="btn-play" title="Play/Pause">
            <svg viewBox="0 0 24 24" id="playSvg"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <button type="button" class="ctrl-btn" id="btn-mute" title="Mute/Unmute">
            <svg viewBox="0 0 24 24" id="muteSvg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </button>
          <input type="range" class="volume-slider" id="vol" min="0" max="1" step="0.05" value="1" title="Volumen">
        </div>
      </div>
      <div class="post-content">
        <h2 class="post-title">Video destacado · Descubre más contenido</h2>
        <div class="post-actions">
          <span>👍 Me gusta</span>
          <span>💬 Comentar</span>
          <span>↗ Compartir</span>
        </div>
        <div class="post-metrics">
          <span id="metricLikes">0</span><span class="sep">·</span><span id="metricComments">0 comentarios</span><span class="sep">·</span><span id="metricPlays">0 reproducciones</span>
        </div>
      </div>
    </div>
    <script type="module">
      import { initVideoBanner } from "./video-banner.js";
      const metrics = {};
      window.addEventListener("banner-track", function(e) {
        const ev = e.detail.event;
        metrics[ev] = (metrics[ev] || 0) + 1;
        const countEl = document.getElementById("s-" + ev);
        if (countEl) countEl.textContent = metrics[ev];
      });
      initVideoBanner({ size: "300x600", clickUrl: "https://example.com" });
    </script>
  </body>
</html>
