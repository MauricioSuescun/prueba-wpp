<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Banner 300x600</title>

    <style>
      body {
        margin: 0;
        padding: 0;
      }

      .banner {
        width: 300px;
        height: 600px;
        background: linear-gradient(135deg, #111, #2c2c2c);
        color: white;
        font-family: Arial, sans-serif;
        padding: 24px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        animation: fadeIn 0.8s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 16px;
        animation: slideIn 0.6s ease forwards;
      }

      .description {
        font-size: 16px;
        line-height: 1.4;
        margin-bottom: 24px;
        animation: slideIn 0.9s ease forwards;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-15px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .cta {
        position: absolute;
        bottom: 24px;
        left: 24px;
        background: #ff3b3b;
        padding: 10px 18px;
        border-radius: 4px;
        font-size: 15px;
        font-weight: bold;
        transition:
          transform 0.3s ease,
          background 0.3s ease;
      }

      .cta:hover {
        transform: scale(1.1);
        background: #ff1f1f;
      }
      .stats-panel {
        position: fixed;
        top: 16px; right: 16px;
        background: rgba(0,0,0,0.92);
        border: 1px solid #333;
        border-radius: 10px;
        padding: 14px 18px;
        color: #fff;
        font-size: 12px;
        min-width: 200px;
        z-index: 999;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      .stats-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 10px; }
      .stats-panel .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
      .stats-panel .stat-row:last-child { border-bottom: none; }
      .stats-panel .stat-count { font-weight: 700; font-variant-numeric: tabular-nums; }
    </style>
  </head>

  <body>
    <div class="stats-panel" id="statsPanel">
      <h3>Métricas de interacción</h3>
      <div class="stat-row"><span>👁 Impresión</span><span class="stat-count" id="s-impression">0</span></div>
      <div class="stat-row"><span>🖱 Clic banner</span><span class="stat-count" id="s-banner_click">0</span></div>
      <div class="stat-row"><span>🔘 Clic CTA</span><span class="stat-count" id="s-cta_click">0</span></div>
    </div>
    <div class="banner" id="banner">
      <div class="title" id="title">Cargando...</div>
      <div class="description" id="description"></div>
      <div class="cta" id="cta">...</div>
    </div>

    <script type="module">
      import { trackEvent } from "/utils/tracking.js";
      const metrics = {};
      window.addEventListener("banner-track", function(e) {
        const ev = e.detail.event;
        metrics[ev] = (metrics[ev] || 0) + 1;
        const countEl = document.getElementById("s-" + ev);
        if (countEl) countEl.textContent = metrics[ev];
      });

      let currentAd = null;
      const clickUrl = "https://example.com";

      async function loadAd() {
        try {
          const response = await fetch("/api/ads/random");
          const data = await response.json();

          currentAd = data;

          document.getElementById("title").textContent = data.title;
          document.getElementById("description").textContent = data.description;
          document.getElementById("cta").textContent = data.cta;

          trackEvent({
            bannerType: "dynamic_banner_300x600",
            event: "impression",
            adId: currentAd?.id,
          });
        } catch (error) {
          document.getElementById("title").textContent =
            "Error cargando anuncio";
        }
      }

      document.getElementById("banner").addEventListener("click", () => {
        trackEvent({
          bannerType: "dynamic_banner_300x600",
          event: "banner_click",
          adId: currentAd?.id,
        });
        window.open(clickUrl, "_blank");
      });

      document.getElementById("cta").addEventListener("click", (e) => {
        e.stopPropagation();
        trackEvent({
          bannerType: "dynamic_banner_300x600",
          event: "cta_click",
          adId: currentAd?.id,
        });
        window.open(clickUrl, "_blank");
      });

      loadAd();
    </script>
  </body>
</html>
