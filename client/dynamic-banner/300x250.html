<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Banner 300x250</title>

    <style>
      body{margin:0;padding:0;}
      .banner{
        width:300px;height:250px;
        background:linear-gradient(135deg,#c00,#900);
        color:#fff;font-family:"Arial Black",Arial,sans-serif;
        position:relative;overflow:hidden;cursor:pointer;
        animation:fadeIn 0.8s ease forwards;
      }
      .banner::before{
        content:"NIKE";
        position:absolute;top:50%;left:50%;
        transform:translate(-50%,-50%) rotate(-15deg);
        font-size:180px;font-weight:900;
        color:rgba(255,255,255,0.08);
        white-space:nowrap;pointer-events:none;
      }
      .banner::after{
        content:"";position:absolute;top:0;left:0;
        width:100%;height:100%;
        background:url('https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg') no-repeat center;
        background-size:120px 120px;opacity:0.05;transform:rotate(15deg);
      }
      .logo{position:absolute;top:8px;left:50%;transform:translateX(-50%);
        width:60px;opacity:0.9;animation:slideDown 0.6s ease forwards;}
      .title{font-size:24px;margin:80px 16px 0;
        text-shadow:0 2px 4px rgba(0,0,0,0.7);
        white-space:normal;word-break:break-word;}
      .description{font-size:16px;margin:6px 16px 0;
        text-shadow:0 2px 4px rgba(0,0,0,0.7);
        white-space:normal;word-break:break-word;}
      .product-img{position:absolute;bottom:30px;left:50%;
        transform:translateX(-50%) rotate(-5deg) scale(0);
        width:220px;transition:transform 0.6s ease;
        filter:drop-shadow(0 6px 10px rgba(0,0,0,0.5));}
      .product-img.visible{transform:translateX(-50%) rotate(-5deg) scale(1);}
      .cta{position:absolute;bottom:6px;left:50%;
        transform:translateX(-50%);
        background:#000;color:#fff;
        padding:12px 24px;border-radius:4px;
        font-size:16px;font-weight:900;
        text-transform:uppercase;letter-spacing:1px;
        transition:transform 0.2s,background 0.2s;}
      .cta:hover{transform:translateX(-50%) scale(1.08);
        background:#111;}
      @keyframes slideDown{from{opacity:0;transform:translateY(-15px);}to{opacity:0.85;transform:translateY(0);}}
      @keyframes fadeIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
      .stats-panel{position:fixed;top:16px;right:16px;
        background:rgba(0,0,0,0.92);border:1px solid #333;
        border-radius:10px;padding:14px 18px;color:#fff;
        font-size:12px;min-width:200px;z-index:999;
        box-shadow:0 8px 24px rgba(0,0,0,0.4);}
      .stats-panel h3{font-size:10px;text-transform:uppercase;
        letter-spacing:2px;color:#888;margin-bottom:10px;}
      .stats-panel .stat-row{display:flex;
        justify-content:space-between;padding:4px 0;
        border-bottom:1px solid #222;}
      .stats-panel .stat-row:last-child{border-bottom:none;}
      .stats-panel .stat-count{font-weight:700;
        font-variant-numeric:tabular-nums;}
    </style>
  </head>

  <body>
    <div class="stats-panel" id="statsPanel">
      <h3>Métricas de interacción</h3>
      <div class="stat-row"><span>👁 Impresión</span><span class="stat-count" id="s-impression">0</span></div>
      <div class="stat-row"><span>🖱 Clic banner</span><span class="stat-count" id="s-banner_click">0</span></div>
      <div class="stat-row"><span>🔘 Clic CTA</span><span class="stat-count" id="s-cta_click">0</span></div>
    </div>
    <div class="banner" id="banner">
      <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike logo" />
      <img class="product-img" id="productImg" src="" alt="Producto" />
      <div class="title" id="title">Cargando...</div>
      <div class="description" id="description"></div>
      <div class="cta" id="cta">...</div>
    </div>

    <script type="module">
      import { trackEvent } from "/utils/tracking.js";
      const metrics = {};
      window.addEventListener("banner-track", function(e) {
        const ev = e.detail.event;
        metrics[ev] = (metrics[ev] || 0) + 1;
        const countEl = document.getElementById("s-" + ev);
        if (countEl) countEl.textContent = metrics[ev];
      });

      let currentAd = null;
      const PRODUCT_IMAGES = [
        "https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/994517/pexels-photo-994517.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/19090/pexels-photo.jpg?auto=compress&cs=tinysrgb&w=600",
      ];

      async function loadAd() {
        try {
          const response = await fetch("/api/ads/random");
          const data = await response.json();

          currentAd = data;

          document.getElementById("title").textContent = data.title;
          document.getElementById("description").textContent = data.description;
          document.getElementById("cta").textContent = data.cta;

          const imgEl = document.getElementById("productImg");
          if (imgEl) {
            imgEl.classList.remove("visible");
            const idx = Math.floor(Math.random() * PRODUCT_IMAGES.length);
            imgEl.src = PRODUCT_IMAGES[idx];
            setTimeout(() => imgEl.classList.add("visible"), 50);
          }

          trackEvent({
            bannerType: "dynamic_banner_300x250",
            event: "impression",
            adId: currentAd?.id,
          });
        } catch (error) {
          document.getElementById("title").textContent =
            "Error cargando anuncio";
        }
      }

      document.getElementById("banner").addEventListener("click", () => {
        trackEvent({
          bannerType: "dynamic_banner_300x250",
          event: "banner_click",
          adId: currentAd?.id,
        });

        window.open("https://example.com", "_blank");
      });

      document.getElementById("cta").addEventListener("click", (e) => {
        e.stopPropagation(); // evita doble evento

        trackEvent({
          bannerType: "dynamic_banner_300x250",
          event: "cta_click",
          adId: currentAd?.id,
        });

        window.open("https://example.com", "_blank");
      });

      loadAd();
    </script>
  </body>
</html>
