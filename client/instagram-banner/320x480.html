<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Carousel Post 320x480</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; }
      .banner {
        width: 320px;
        height: 480px;
        background: #000;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        border-radius: 12px;
      }
      .carousel {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .track {
        display: flex;
        height: 100%;
        transition: transform 0.35s ease;
      }
      .slide {
        flex: 0 0 100%;
        height: 100%;
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(255,255,255,0.9);
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }
      .nav:hover { background: #fff; }
      .nav.prev { left: 8px; }
      .nav.next { right: 8px; }
      .dots {
        position: absolute;
        bottom: 12px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 6px;
        z-index: 2;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.5);
        cursor: pointer;
        padding: 0;
      }
      .dot.active { background: #fff; }
      .brand {
        position: absolute;
        top: 12px;
        left: 12px;
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        z-index: 2;
      }
      .stats-panel {
        position: fixed;
        top: 16px; right: 16px;
        background: rgba(0,0,0,0.92);
        border: 1px solid #333;
        border-radius: 10px;
        padding: 14px 18px;
        color: #fff;
        font-size: 12px;
        min-width: 200px;
        z-index: 999;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      .stats-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 10px; }
      .stats-panel .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
      .stats-panel .stat-row:last-child { border-bottom: none; }
      .stats-panel .stat-count { font-weight: 700; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="stats-panel" id="statsPanel">
      <h3>Métricas de interacción</h3>
      <div class="stat-row"><span>◀ Flecha izq.</span><span class="stat-count" id="s-carousel_arrow_left">0</span></div>
      <div class="stat-row"><span>▶ Flecha der.</span><span class="stat-count" id="s-carousel_arrow_right">0</span></div>
      <div class="stat-row"><span>🖱 Clic imagen</span><span class="stat-count" id="s-carousel_image_click">0</span></div>
      <div class="stat-row"><span>🖱 Clic banner</span><span class="stat-count" id="s-banner_click">0</span></div>
    </div>
    <div class="banner" id="banner">
      <span class="brand">Marca Demo</span>
      <div class="carousel">
        <div class="track" id="track"></div>
        <button type="button" class="nav prev" id="btn-prev" aria-label="Anterior">‹</button>
        <button type="button" class="nav next" id="btn-next" aria-label="Siguiente">›</button>
        <div class="dots" id="dots"></div>
      </div>
    </div>
    <script type="module">
      import { initCarouselBanner } from "./carousel-banner.js";
      const metrics = {};
      window.addEventListener("banner-track", function(e) {
        const ev = e.detail.event;
        metrics[ev] = (metrics[ev] || 0) + 1;
        const countEl = document.getElementById("s-" + ev);
        if (countEl) countEl.textContent = metrics[ev];
      });
      initCarouselBanner({ size: "320x480", bannerType: "instagram_banner_320x480" });
    </script>
  </body>
</html>
