<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Carousel Post 320x480</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; }
      .banner {
        width: 320px;
        height: 480px;
        background: #000;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        border-radius: 12px;
      }
      .carousel {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .track {
        display: flex;
        height: 100%;
        transition: transform 0.35s ease;
      }
      .slide {
        flex: 0 0 100%;
        height: 100%;
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(255,255,255,0.9);
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }
      .nav:hover { background: #fff; }
      .nav.prev { left: 8px; }
      .nav.next { right: 8px; }
      .dots {
        position: absolute;
        bottom: 12px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 6px;
        z-index: 2;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.5);
        cursor: pointer;
        padding: 0;
      }
      .dot.active { background: #fff; }
      .brand {
        position: absolute;
        top: 12px;
        left: 12px;
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="banner" id="banner">
      <span class="brand">Marca Demo</span>
      <div class="carousel">
        <div class="track" id="track"></div>
        <button type="button" class="nav prev" id="btn-prev" aria-label="Anterior">‹</button>
        <button type="button" class="nav next" id="btn-next" aria-label="Siguiente">›</button>
        <div class="dots" id="dots"></div>
      </div>
    </div>
    <script type="module">
      import { initCarouselBanner } from "./carousel-banner.js";
      initCarouselBanner({ size: "320x480", bannerType: "instagram_carousel_320x480" });
    </script>
  </body>
</html>
