<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Instagram 300x600</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0d0d0d;
        min-height: 100vh;
        padding: 24px;
        font-family: "DM Sans", sans-serif;
      }
      .banner {
        width: 300px;
        height: 600px;
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        position: relative;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      }
      .banner-header {
        flex-shrink: 0;
        background: #fff;
        padding: 12px 14px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #efefef;
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 13px;
      }
      .header-info { flex: 1; min-width: 0; }
      .handle {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: #262626;
        display: block;
      }
      .sponsored { font-size: 11px; color: #8e8e8e; display: block; }
      .dots-menu {
        margin-left: auto;
        color: #262626;
        cursor: pointer;
        font-size: 18px;
        letter-spacing: 2px;
        line-height: 1;
      }
      .carousel-container {
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        height: 300px;
        background: #000;
      }
      .track {
        display: flex;
        height: 100%;
        transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .slide {
        flex: 0 0 100%;
        height: 100%;
        position: relative;
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }
      .slide-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.5));
        padding: 20px 12px 10px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .slide:hover .slide-overlay { opacity: 1; }
      .slide-tag {
        background: #fff;
        color: #000;
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 1px;
        padding: 4px 8px;
        display: inline-block;
        border-radius: 2px;
      }
      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 50%;
        background: rgba(255,255,255,0.92);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        transition: transform 0.2s, background 0.2s;
      }
      .nav:hover { background: #fff; transform: translateY(-50%) scale(1.08); }
      .nav svg { width: 16px; height: 16px; fill: #262626; }
      .nav.prev { left: 8px; }
      .nav.next { right: 8px; }
      .nav.hidden { opacity: 0; pointer-events: none; }
      .dots {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        z-index: 10;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.5);
        cursor: pointer;
        padding: 0;
        transition: background 0.3s, width 0.3s;
      }
      .dot.active { background: #fff; width: 14px; border-radius: 3px; }
      .banner-body {
        flex: 1;
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 0;
      }
      .action-bar {
        display: flex;
        gap: 14px;
        margin-bottom: 10px;
      }
      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 2px;
        display: flex;
        align-items: center;
        transition: transform 0.2s;
      }
      .action-btn:hover { transform: scale(1.15); }
      .action-btn svg { width: 24px; height: 24px; fill: #262626; }
      .action-btn.save { margin-left: auto; }
      .caption-brand {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 24px;
        line-height: 1.15;
        color: #262626;
        text-transform: uppercase;
      }
      .caption-text {
        font-size: 13px;
        color: #262626;
        line-height: 1.45;
        margin-top: 6px;
      }
      .cta-btn {
        display: inline-block;
        background: #262626;
        color: #fff;
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 10px 18px;
        text-decoration: none;
        margin-top: 12px;
        align-self: flex-start;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .cta-btn:hover { background: #000; }
      .stats-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        background: rgba(0,0,0,0.92);
        border: 1px solid #333;
        border-radius: 10px;
        padding: 14px 18px;
        color: #fff;
        font-size: 12px;
        min-width: 200px;
        z-index: 999;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      .stats-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 10px; }
      .stats-panel .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
      .stats-panel .stat-row:last-child { border-bottom: none; }
      .stats-panel .stat-count { font-weight: 700; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="stats-panel" id="statsPanel">
      <h3>Métricas de interacción</h3>
      <div class="stat-row"><span>◀ Flecha izq.</span><span class="stat-count" id="s-carousel_arrow_left">0</span></div>
      <div class="stat-row"><span>▶ Flecha der.</span><span class="stat-count" id="s-carousel_arrow_right">0</span></div>
      <div class="stat-row"><span>🖱 Clic imagen</span><span class="stat-count" id="s-carousel_image_click">0</span></div>
      <div class="stat-row"><span>🖱 Clic banner</span><span class="stat-count" id="s-banner_click">0</span></div>
    </div>
    <div class="banner" id="banner">
      <div class="banner-header">
        <div class="avatar">A</div>
        <div class="header-info">
          <span class="handle">adidas</span>
          <span class="sponsored">Patrocinado</span>
        </div>
        <span class="dots-menu">···</span>
      </div>
      <div class="carousel-container">
        <div class="track" id="track"></div>
        <button type="button" class="nav prev" id="btn-prev" aria-label="Anterior">
          <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        </button>
        <button type="button" class="nav next" id="btn-next" aria-label="Siguiente">
          <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
        <div class="dots" id="dots"></div>
      </div>
      <div class="banner-body">
        <div>
          <div class="action-bar">
            <button type="button" class="action-btn" aria-label="Me gusta">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
            <button type="button" class="action-btn" aria-label="Comentar">
              <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
            </button>
            <button type="button" class="action-btn save" aria-label="Guardar">
              <svg viewBox="0 0 24 24"><path d="M17 2H7c-1.1 0-2 .9-2 2v18l7-3 7 3V4c0-1.1-.9-2-2-2z"/></svg>
            </button>
          </div>
          <div class="caption-brand">Impossible<br>is Nothing</div>
          <p class="caption-text">Explora la nueva colección adidas. Cada imagen te lleva a una categoría diferente.</p>
        </div>
        <span class="cta-btn">Comprar ahora</span>
      </div>
    </div>
    <script type="module">
      import { initCarouselBanner } from "./carousel-banner.js";
      const metrics = {};
      window.addEventListener("banner-track", function(e) {
        const ev = e.detail.event;
        metrics[ev] = (metrics[ev] || 0) + 1;
        const countEl = document.getElementById("s-" + ev);
        if (countEl) countEl.textContent = metrics[ev];
      });
      initCarouselBanner({ size: "300x600", bannerType: "instagram_banner_300x600" });
    </script>
  </body>
</html>
